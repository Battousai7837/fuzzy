<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#122636" />
    <title>Fuzzy offline</title>
    <style>
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #fbfaf7;
        color: #17211b;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100% - 32px, 390px);
        padding: 28px;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 55px rgba(18, 38, 54, 0.16);
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
        border-radius: 18px;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: 26px;
      }
      p {
        margin: 0;
        color: #756f66;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/mobile/fuzzy/assets/images/logo/48.png" alt="Fuzzy" />
      <h1>Không có kết nối mạng</h1>
      <p>Fuzzy vẫn mở được ở chế độ offline. Vui lòng kết nối lại để đồng bộ giỏ hàng và đơn hàng mới.</p>
    </main>
  </body>
</html>
